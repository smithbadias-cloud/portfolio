<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 1</title>
    <link rel="stylesheet" href="Formulario-1.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <meta name="description" content="formulario de informacion basica">
</head>
<body>
    <main class="main-bar">
        <form class="main-bar__form">
            <h2>Formulario</h2>
            <fieldset class="main-bar__fieldset">
                <legend>Información Básica</legend>
                <div>
                    <input autofocus id="name" type="text" placeholder="Nombre">
                </div>
                <div>
                    <input id="correo" type="email" placeholder="example@gmail.com">
                </div>
                <div>
                    <input id="asunto" type="text" placeholder="Asunto de tu mensaje">
                </div>
            </fieldset>
            <div class="main-bar__form-two">
                <div>
                    <label for="opciones">Tipo De Asunto:
                    </label>
                    <select id="opciones">
                            <option>Mantenimiento</option>
                            <option>Limpieza</option>
                            <option>Reparaciones</option>
                            <option>Instalaciones</option>
                        </select>
                </div>
                <div>
                    <input placeholder="Otros" type="text" list="listas">
                    <datalist id="listas">
                        <option value="Inventario">listado detallado y organizado de los bienes</option>
                        <option value="Reorganización">documento donde se relaciona a quién debe y cuánto dinero debe la empresa.</option>
                        <option value="Mapeo">ayuda a identificar todas las entidades con acceso a los conjuntos de datos. </option>
                        <option value="Ayudantes">persona que desempeña tareas auxiliares a las órdenes de otra</option>
                    </datalist>
                </div>
                <div>
                    <div>
                        <textarea id="mensaje" placeholder="Deja tu mensaje..."></textarea>
                    </div>
                </div>
            </div>
            <button>Enviar</button>
        </form>
    </main>
</body>
</html>
