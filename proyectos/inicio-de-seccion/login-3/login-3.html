<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-3</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link rel="stylesheet" href="Login-3.css">
</head>
<body>
    <div class="modal"></div>
    <form>
        <div class="form__item">
            <h2>Login</h2>
        </div>
        <div class="form__item">
            <input required autofocus id="nombre" type="email" placeholder="Username">
            <label class="material-symbols-outlined" for="nombre">person</label>
        </div>
        <div class="form__item">
            <input required id="contraseña" type="password" placeholder="Password">
            <label class="material-symbols-outlined" for="contraseña">lock</label>
        </div>
        <div class="form__item">
            <div>
                <input id="clic" type="checkbox">
                <label for="clic">Remember me</label>
            </div>
            <div>
                <a href="#">Forgot password?</a>
            </div>
        </div>
        <div class="form__item">
            <button>Login</button>
        </div>
        <div class="form__item">
            <p> Don`t have an account?
                <a href="#">Register</a>
            </p>
        </div>
    </form>
</body>
</html>
